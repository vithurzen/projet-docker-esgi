version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ecommerce/frontend:latest
    ports:
      - "80:80"
    depends_on:
      - auth-service
      - product-service
      - order-service
    networks:
      - ecommerce-overlay
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  auth-service:
    build:
      context: ./services/auth-service
      target: prod
    image: ecommerce/auth-service:latest
    environment:
      - NODE_ENV=production
      - PORT=3001
      - MONGO_URI=mongodb://mongo-auth:27017/authdb
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - ecommerce-overlay
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  product-service:
    build:
      context: ./services/product-service
      target: prod
    image: ecommerce/product-service:latest
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGO_URI=mongodb://mongo-product:27017/productdb
    networks:
      - ecommerce-overlay
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  order-service:
    build:
      context: ./services/order-service
      target: prod
    image: ecommerce/order-service:latest
    environment:
      - NODE_ENV=production
      - PORT=3002
      - MONGO_URI=mongodb://mongo-order:27017/orderdb
    networks:
      - ecommerce-overlay
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  mongo-auth:
    image: mongo:6
    volumes:
      - mongo-auth-data:/data/db
    networks:
      - ecommerce-overlay
    deploy:
      replicas: 1

  mongo-product:
    image: mongo:6
    volumes:
      - mongo-product-data:/data/db
    networks:
      - ecommerce-overlay
    deploy:
      replicas: 1

  mongo-order:
    image: mongo:6
    volumes:
      - mongo-order-data:/data/db
    networks:
      - ecommerce-overlay
    deploy:
      replicas: 1

volumes:
  mongo-auth-data:
  mongo-product-data:
  mongo-order-data:

networks:
  ecommerce-overlay:
    driver: overlay