version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    depends_on:
      - auth-service
      - product-service
      - order-service
    networks:
      - ecommerce-network

  auth-service:
    build:
      context: ./services/auth-service
      target: dev
    container_name: auth-service
    ports:
      - "3001:3001"
    volumes:
      - ./services/auth-service:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3001
      - MONGO_URI=mongodb://mongo-auth:27017/authdb
      - JWT_SECRET=change_me
    depends_on:
      - mongo-auth
    networks:
      - ecommerce-network

  product-service:
    build:
      context: ./services/product-service
      target: dev
    container_name: product-service
    ports:
      - "3000:3000"
    volumes:
      - ./services/product-service:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3000
      - MONGO_URI=mongodb://mongo-product:27017/productdb
    depends_on:
      - mongo-product
    networks:
      - ecommerce-network

  order-service:
    build:
      context: ./services/order-service
      target: dev
    container_name: order-service
    ports:
      - "3002:3002"
    volumes:
      - ./services/order-service:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3002
      - MONGO_URI=mongodb://mongo-order:27017/orderdb
    depends_on:
      - mongo-order
    networks:
      - ecommerce-network

  mongo-auth:
    image: mongo:6
    container_name: mongo-auth
    ports:
      - "27017:27017"
    volumes:
      - mongo-auth-data:/data/db
    networks:
      - ecommerce-network

  mongo-product:
    image: mongo:6
    container_name: mongo-product
    ports:
      - "27018:27017"
    volumes:
      - mongo-product-data:/data/db
    networks:
      - ecommerce-network

  mongo-order:
    image: mongo:6
    container_name: mongo-order
    ports:
      - "27019:27017"
    volumes:
      - mongo-order-data:/data/db
    networks:
      - ecommerce-network

volumes:
  mongo-auth-data:
  mongo-product-data:
  mongo-order-data:

networks:
  ecommerce-network:
    driver: bridge